linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - revive
    - gosec
    - exhaustive
    - bodyclose
    - noctx

linters-settings:
  revive:
    rules:
      - name: exported
        severity: warning
  gosec:
    excludes:
      - G404 # math/rand — WS token için değil
  goimports:
    local-prefixes: github.com/Ayazaga-Boys/rollpit

issues:
  exclude-rules:
    - path: "_test.go"
      linters:
        - gosec
        - errcheck

run:
  timeout: 5m
  go: "1.24"
